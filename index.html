<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>追剧记</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f5f7;color:#111;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}

/* ── 应用容器 ── */
#app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh;position:relative}

/* ── 顶栏 ── */
.header{padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:#fff;z-index:20}
.header h1{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.header-right{display:flex;gap:10px;align-items:center}
.header-btn{background:none;border:none;font-size:18px;color:#9ca3af;padding:4px}

/* ── 底部导航 ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f3f4f6;display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0 12px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .ni{font-size:20px;color:#ddd}
.nav-btn .nl{font-size:10px;color:#9ca3af;font-weight:400}
.nav-btn.active .ni{color:#111}
.nav-btn.active .nl{color:#111;font-weight:800}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));right:50%;transform:translateX(calc(50% + 160px));width:50px;height:50px;border-radius:50%;background:#111;border:none;color:#fff;font-size:26px;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:19}

/* ── 页面 ── */
.page{display:none;padding:14px 16px 90px}
.page.active{display:block}

/* ── Chips ── */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:5px 13px;border-radius:99px;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;font-size:13px;font-weight:400;white-space:nowrap;transition:all .15s}
.chip.active{border-color:#111;background:#111;color:#fff;font-weight:700}

/* ── 状态Tab ── */
.status-tabs{display:flex;border-bottom:1px solid #f3f4f6;margin:0 -16px;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.status-tabs button{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;color:#9ca3af;font-weight:400;font-size:14px;white-space:nowrap;min-width:60px}
.status-tabs button.active{border-bottom-color:#111;color:#111;font-weight:800}

/* ── 卡片网格 ── */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{border-radius:12px;overflow:hidden;border:1px solid #f3f4f6;background:#fff;cursor:pointer;transition:box-shadow .15s}
.card:active{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card-cover{aspect-ratio:2/3;background:#f9fafb;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px}
.card-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.card-badge{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.65);color:#fff;border-radius:5px;padding:1px 5px;font-size:10px;font-weight:700}
.card-info{padding:7px 8px 9px}
.card-title{font-weight:700;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-bottom:2px}
.card-meta{font-size:11px;color:#9ca3af}
.empty{text-align:center;color:#d1d5db;padding:60px 0;font-size:14px;grid-column:1/-1}

/* ── 榜单 ── */
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid #f9fafb;cursor:pointer;border-radius:8px}
.rank-item:active{background:#fafafa}
.rank-num{width:32px;text-align:center;font-weight:800;flex-shrink:0}
.rank-thumb{width:40px;height:55px;border-radius:6px;overflow:hidden;background:#f3f4f6;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative}
.rank-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ── 日历 ── */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-nav{background:none;border:1px solid #e5e7eb;border-radius:8px;padding:7px 14px;font-size:16px;color:#111}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dname{text-align:center;font-size:11px;color:#9ca3af;padding-bottom:5px}
.cal-cell{min-height:62px;background:#fff;border:1px solid #f3f4f6;border-radius:7px;padding:3px 2px;overflow:hidden}
.cal-cell.empty{background:transparent;border:none}
.cal-date{font-size:11px;text-align:center;margin-bottom:2px;color:#d1d5db;font-weight:400}
.cal-date.has{color:#111;font-weight:700}
.cal-thumb{height:20px;border-radius:3px;overflow:hidden;background:#f3f4f6;margin-bottom:1px;display:flex;align-items:center;justify-content:center;font-size:10px;position:relative}
.cal-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ── 搜索 ── */
.search-box{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;background:#f9fafb;margin-bottom:12px;color:#111}

/* ── 片单 ── */
.list-wrap{position:relative;display:inline-flex}
.list-del{position:absolute;top:-5px;right:-5px;background:#111;border:none;border-radius:50%;width:16px;height:16px;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center}

/* ── 全屏页面 ── */
.fullpage{position:fixed;inset:0;background:#fff;z-index:50;overflow-y:auto;display:none;flex-direction:column}
.fullpage.show{display:flex}
.fp-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:#fff;z-index:5;flex-shrink:0}
.fp-back{background:none;border:none;font-size:22px;color:#111;padding:2px 6px 2px 0}
.fp-title{font-size:17px;font-weight:800;flex:1}
.fp-body{flex:1;overflow-y:auto;padding:16px 16px 40px}

/* ── 表单元素 ── */
.field{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px 13px;font-size:15px;outline:none;background:#f9fafb;color:#111;display:block;margin-bottom:12px}
.field:focus{border-color:#aaa}
.field-label{font-size:12px;color:#9ca3af;margin-bottom:5px;font-weight:600}
.field-row{display:flex;gap:8px;margin-bottom:12px}
.field-row .field{margin-bottom:0}

/* ── 星评 ── */
.star-row{display:inline-flex;gap:2px}
.star-row span{font-size:26px;cursor:pointer;color:#e5e7eb;user-select:none;transition:color .1s}
.star-row span.on{color:#111}
.star-sm{display:inline-flex;gap:1px}
.star-sm span{font-size:14px;color:#e5e7eb}
.star-sm span.on{color:#111}

/* ── 图片预览 ── */
.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-item{position:relative;width:70px;height:70px}
.img-item img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid #e5e7eb}
.img-del{position:absolute;top:-5px;right:-5px;background:#111;border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center}

/* ── 分集列表 ── */
.ep-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f9fafb;border-radius:8px;margin-bottom:6px}
.ep-num{font-weight:700;font-size:12px;min-width:36px;color:#111}

/* ── 详情页 ── */
.detail-hero{width:100%;aspect-ratio:3/2;background:#f3f4f6;position:relative;overflow:hidden;flex-shrink:0}
.detail-hero img{width:100%;height:100%;object-fit:cover}
.detail-hero .emoji-cover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px}
.detail-hero .gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%)}
.detail-hero .hero-info{position:absolute;bottom:0;left:0;right:0;padding:16px}
.hero-title{color:#fff;font-size:20px;font-weight:800;margin-bottom:8px}
.hero-tags{display:flex;gap:5px;flex-wrap:wrap}
.hero-tag{background:rgba(255,255,255,.22);backdrop-filter:blur(6px);color:#fff;font-size:11px;padding:3px 8px;border-radius:99px}
.detail-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:2}
.d-btn{background:rgba(0,0,0,.35);backdrop-filter:blur(6px);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:13px}

/* ── 详情Tab ── */
.detail-tabs{display:flex;border-bottom:1px solid #f3f4f6;padding:0 16px;overflow-x:auto;flex-shrink:0}
.detail-tab{padding:11px 14px;background:none;border:none;border-bottom:2px solid transparent;color:#9ca3af;font-size:14px;font-weight:400;white-space:nowrap}
.detail-tab.active{border-bottom-color:#111;color:#111;font-weight:700}
.detail-content{padding:16px;flex:1}

/* ── 金句 ── */
.quote-item{background:#f9fafb;border-left:3px solid #111;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:10px;position:relative}
.quote-text{font-size:14px;line-height:1.7;color:#374151}
.quote-from{font-size:11px;color:#9ca3af;margin-top:5px}
.quote-del{position:absolute;top:8px;right:8px;background:none;border:none;color:#d1d5db;font-size:16px}

/* ── 进度 ── */
.progress-bar{width:100%;height:6px;background:#f3f4f6;border-radius:99px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:#111;border-radius:99px;transition:width .3s}

/* ── 导出导入 ── */
.io-btn{width:100%;padding:13px;border-radius:10px;border:1.5px solid #111;background:#fff;font-size:15px;font-weight:700;margin-bottom:10px;color:#111;text-align:center}
.io-btn.solid{background:#111;color:#fff}

/* ── emoji选择 ── */
.emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.emoji-opt{width:36px;height:36px;border:2px solid #e5e7eb;border-radius:8px;background:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.emoji-opt.active{border-color:#111;background:#111}

/* ── 统计卡片 ── */
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#f9fafb;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:#111}
.stat-label{font-size:12px;color:#9ca3af;margin-top:2px}

/* ── 通用 ── */
.section-title{font-size:15px;font-weight:800;margin-bottom:12px;color:#111}
.divider{height:1px;background:#f3f4f6;margin:14px 0}
.save-btn{width:100%;background:#111;border:none;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:800;margin-top:8px}
.filter-label{font-size:12px;color:#9ca3af;align-self:center;flex-shrink:0}
.count-label{font-size:12px;color:#9ca3af;margin-bottom:12px}
</style>

</head>

function switchPage(n){

// ══ 星星组件 ══
function makeStars(containerId,size,getValue,setValue){
  var el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML='';
  for(var i=1;i<=5;i++){
    var s=document.createElement('span');
    s.textContent='★';
    s.style.fontSize=(size||26)+'px';
    s.style.cursor='pointer';
    s.style.userSelect='none';
    s.style.color=i<=getValue()?'#111':'#e5e7eb';
    s.style.transition='color .1s';
    (function(v){
      s.onclick=function(){setValue(v===getValue()?0:v);makeStars(containerId,size,getValue,setValue);};
    })(i);
    el.appendChild(s);
  }
}

function starsHtml(v,size){
  var h='<span class="star-sm">';
  for(var i=1;i<=5;i++)h+='<span class="'+(i<=v?'on':'')+'" style="font-size:'+(size||13)+'px">★</span>';
  return h+'</span>';
}

// ══ 页面1: 列表 ══
function renderList(){

function setType(t){curType=t;renderList();}

function cardHtml(item){
  var badge=item.rating>0?'<div class="card-badge">'+'★'.repeat(item.rating)+'</div>':'';
  var cover=item.cover
    ?'<img src="'+item.cover+'" onerror="this.style.display=\'none\'">'
    :'<span>'+(item.emoji||'🎬')+'</span>';
  var prog='';
  if(item.status==='watching'&&item.episodes>0&&item.progress>0){
    var pct=Math.min(100,Math.round(item.progress/item.episodes*100));
    prog='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
  }
  return '<div class="card" onclick="openDetail(\''+item.id+'\')">'
    +'<div class="card-cover">'+cover+badge+'</div>'
    +'<div class="card-info">'
    +'<div class="card-title">'+esc(item.title)+'</div>'
    +'<div class="card-meta">'+(item.year||'')+(item.year&&item.genre?' · ':'')+esc(item.genre||'')+'</div>'
    +prog
    +'</div></div>';
}

// ══ 页面3: 日历 ══
function renderCal(){
  var y=calDate.getFullYear(),m=calDate.getMonth();
  var ms=y+'-'+String(m+1).padStart(2,'0');
  document.getElementById('cal-title').textContent=y+' · '+String(m+1).padStart(2,'0');
  document.getElementById('cal-dnames').innerHTML=['日','一','二','三','四','五','六'].map(function(d){
    return '<div class="cal-dname">'+d+'</div>';
  }).join('');

  var byDay={};
  DB.items.forEach(function(it){
    [it.startDate,it.endDate].forEach(function(d){
      if(!d||!d.startsWith(ms))return;
      var dd=parseInt(d.slice(8,10));
      if(!byDay[dd])byDay[dd]=[];
      if(!byDay[dd].find(function(x){return x.id===it.id;}))byDay[dd].push(it);
    });
  });

  var fd=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),html='';
  for(var i=0;i<fd;i++)html+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=days;d++){
    var its=byDay[d]||[];
    var thumbs=its.slice(0,2).map(function(it){
      var img=it.cover?'<img src="'+it.cover+'" onerror="this.style.display=\'none\'">':(it.emoji||'🎬');
      return '<div class="cal-thumb" onclick="openDetail(\''+it.id+'\')">'+img+'</div>';
    }).join('');
    var more=its.length>2?'<div style="font-size:9px;color:#9ca3af;text-align:center">+' +(its.length-2)+'</div>':'';
    html+='<div class="cal-cell"><div class="cal-date '+(its.length?'has':'')+'">'+d+'</div>'+thumbs+more+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;

// ══ 封面 ══
function handleCoverUpload(e){
  var file=e.target.files[0];
  if(!file)return;
  // 压缩图片
  var reader=new FileReader();
  reader.onload=function(ev){
    compressImage(ev.target.result,800,function(compressed){
      fCoverData=compressed;
      document.getElementById('cover-img-preview').src=compressed;
      document.getElementById('cover-img-preview').style.display='block';
      document.getElementById('cover-emoji-preview').style.display='none';
      document.getElementById('f-cover-url').value='';
    });
  };
  reader.readAsDataURL(file);
}

function handleCoverUrl(){
  var url=document.getElementById('f-cover-url').value.trim();
  if(url){
    fCoverData='';
    document.getElementById('cover-img-preview').src=url;
    document.getElementById('cover-img-preview').style.display='block';
    document.getElementById('cover-emoji-preview').style.display='none';
  } else {
    document.getElementById('cover-img-preview').style.display='none';
    document.getElementById('cover-emoji-preview').style.display='';
  }
}

// ══ 图片压缩 ══
function compressImage(dataUrl,maxW,cb){
  var img=new Image();
  img.onload=function(){
    var w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    var canvas=document.createElement('canvas');
    canvas.width=w;canvas.height=h;
    canvas.getContext('2d').drawImage(img,0,0,w,h);
    cb(canvas.toDataURL('image/jpeg',0.7));
  };
  img.src=dataUrl;
}

// ══ 图片 ══
function handleImages(e){
  Array.from(e.target.files).forEach(function(file){
    var rd=new FileReader();
    rd.onload=function(ev){
      compressImage(ev.target.result,600,function(compressed){
        fImages.push(compressed);
        renderImgPreview();
      });
    };
    rd.readAsDataURL(file);
  });
}
function renderImgPreview(){
  document.getElementById('img-preview').innerHTML=fImages.map(function(img,i){
    return '<div class="img-item"><img src="'+img+'"><button class="img-del" onclick="removeImg('+i+')">✕</button></div>';
  }).join('');
}

      +'</div>';
  }).join('');

// ══ AI填写 ══
async function fetchAI(){
  var title=document.getElementById('f-title').value.trim();
  if(!title){alert('请先输入作品名称');return;}
  var btn=document.getElementById('ai-btn');
  btn.textContent='...';btn.disabled=true;btn.style.background='#ccc';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:400,
        messages:[{role:'user',content:'只输出JSON，不要代码块，不要其他文字。格式：{"synopsis":"不超过80字的剧情简介","genre":"剧集类型","year":"年份","episodes":集数整数,"emoji":"最适合的一个emoji"}\n作品名：'+title+'（'+fType+'）'}]
      })
    });
    var data=await resp.json();
    var text=(data.content&&data.content[0]&&data.content[0].text)||'{}';
    text=text.replace(/```json|```/g,'').trim();
    var info=JSON.parse(text);
    if(info.synopsis)document.getElementById('f-synopsis').value=info.synopsis;
    if(info.genre)document.getElementById('f-genre').value=info.genre;
    if(info.year)document.getElementById('f-year').value=info.year;
    if(info.episodes)document.getElementById('f-episodes').value=info.episodes;
    if(info.emoji){
      document.getElementById('cover-emoji-preview').textContent=info.emoji;
    }
  }catch(e){alert('AI获取失败，请手动填写');}
  btn.textContent='✨ AI';btn.disabled=false;btn.style.background='#111';
}

  var cover=fCoverData||(coverUrl)||'';
  var item={
    id:editId||uid(),
    title:title,
    type:fType,
    status:fStatus,
    rating:fRating,
    cover:cover,
    emoji:document.getElementById('cover-emoji-preview').textContent||'🎬',
    synopsis:document.getElementById('f-synopsis').value.trim(),
    genre:document.getElementById('f-genre').value.trim(),
    year:document.getElementById('f-year').value.trim(),
    episodes:parseInt(document.getElementById('f-episodes').value)||0,
    progress:parseInt(document.getElementById('f-progress').value)||0,
    startDate:document.getElementById('f-start').value,
    endDate:document.getElementById('f-end').value,
    review:document.getElementById('f-review').value.trim(),
    images:fImages.slice(),
    episodeReviews:fEpReviews.slice(),
    quotes:fQuotes.slice(),
    listIds:fListIds.slice()
  };
  if(editId){
    DB.items=DB.items.map(function(i){return i.id===editId?item:i;});
  } else {

  }
  saveDB();
  closeAddPage();

  document.getElementById('hd-count').textContent=DB.items.length+'部';
}

// ══ 详情页 ══
var detailTab='info';
function openDetail(id){
  var item=DB.items.find(function(i){return i.id===id;});
  if(!item)return;
  detailId=id;
  // hero
  if(item.cover){
    document.getElementById('d-cover').src=item.cover;
    document.getElementById('d-cover').style.display='block';
    document.getElementById('d-emoji').style.display='none';
  } else {
    document.getElementById('d-cover').style.display='none';
    document.getElementById('d-emoji').style.display='flex';
    document.getElementById('d-emoji').textContent=item.emoji||'🎬';
  }
  document.getElementById('d-title').textContent=item.title;
  var tags=[STATUS[item.status],TYPES[item.type],item.genre,item.year].filter(Boolean);
  document.getElementById('d-tags').innerHTML=tags.map(function(t){return '<span class="hero-tag">'+esc(t)+'</span>';}).join('');
  // reset tabs
  document.querySelectorAll('.detail-tab').forEach(function(b,i){b.classList.toggle('active',i===0);});
  detailTab='info';
  renderDetailContent(item);
  showPage('fp-detail');
  document.getElementById('fp-detail').scrollTop=0;
}

function switchDTab(tab,btn){
  detailTab=tab;
  document.querySelectorAll('.detail-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var item=DB.items.find(function(i){return i.id===detailId;});
  if(item)renderDetailContent(item);
}

function renderDetailContent(item){
  var el=document.getElementById('d-content');
  if(detailTab==='info'){
    var myLists=DB.lists.filter(function(l){return (item.listIds||[]).indexOf(l.id)>=0;});
    var listsHtml=myLists.length?'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">'
      +myLists.map(function(l){return '<span style="background:#f3f4f6;border-radius:99px;padding:3px 10px;font-size:12px">'+l.emoji+' '+esc(l.name)+'</span>';}).join('')+'</div>':'';
    var prog='';
    if(item.type!=='movie'&&item.type!=='book'&&item.episodes>0){
      var pct=Math.min(100,Math.round((item.progress||0)/item.episodes*100));
      prog='<div style="margin-bottom:14px"><div style="font-size:12px;color:#9ca3af;margin-bottom:4px">观看进度：第'+(item.progress||0)+'集 / 共'+item.episodes+'集（'+pct+'%）</div>'
        +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
    }
    el.innerHTML=
      '<div style="display:flex;justify-content:space-between;margin-bottom:14px">'
      +'<div><div style="font-size:11px;color:#9ca3af;margin-bottom:5px">我的评分</div>'+starsHtml(item.rating,18)+'</div>'
      +'<div style="text-align:right;font-size:13px;color:#6b7280;line-height:2">'
      +(item.startDate?'<div>开始 '+item.startDate+'</div>':'')
      +(item.endDate?'<div>完结 '+item.endDate+'</div>':'')
      +'</div></div>'
      +prog
      +listsHtml
      +(item.synopsis?'<div style="background:#f9fafb;border-radius:10px;padding:14px;font-size:14px;color:#374151;line-height:1.7;margin-bottom:12px">'+esc(item.synopsis)+'</div>':'')
      +(item.review?'<div style="border:1px solid #e5e7eb;border-radius:10px;padding:14px"><div style="font-size:11px;color:#9ca3af;margin-bottom:6px">我的评价</div><div style="font-size:14px;color:#374151;line-height:1.7">'+esc(item.review)+'</div></div>':'');
  } else if(detailTab==='ep'){
    var eps=item.episodeReviews||[];
    el.innerHTML=eps.length?eps.map(function(e){
      return '<div style="background:#f9fafb;border-radius:10px;padding:14px;margin-bottom:10px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:6px">'
        +'<span style="font-weight:700;font-size:13px">第 '+e.ep+' 集</span>'+starsHtml(e.rating,13)+'</div>'
        +'<div style="font-size:14px;color:#374151;line-height:1.6">'+esc(e.comment)+'</div></div>';
    }).join(''):'<div class="empty">暂无分集评论</div>';
  } else if(detailTab==='quotes'){
    var qs=item.quotes||[];
    el.innerHTML=qs.length?qs.map(function(q){
      return '<div class="quote-item"><div class="quote-text">'+esc(q.text)+'</div>'
        +(q.time?'<div class="quote-from">'+q.time+'</div>':'')+'</div>';
    }).join(''):'<div class="empty">暂无金句</div>';
  } else if(detailTab==='imgs'){
    var imgs=item.images||[];
    el.innerHTML=imgs.length
      ?'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
        +imgs.map(function(img){return '<img src="'+img+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px">';}).join('')+'</div>'
      :'<div class="empty">暂无图片</div>';
  }
}

function closeDetail(){closePage('fp-detail');}
function editDetail(){
  var item=DB.items.find(function(i){return i.id===detailId;});
  if(!item)return;
  closeDetail();
  editId=item.id;
  fRating=item.rating||0;fEpRating=0;
  fImages=(item.images||[]).slice();
  fEpReviews=(item.episodeReviews||[]).slice();
  fQuotes=(item.quotes||[]).slice();
  fListIds=(item.listIds||[]).slice();
  fType=item.type||'drama';
  fStatus=item.status||'watching';
  fCoverData=item.cover&&item.cover.startsWith('data:')?item.cover:'';
  document.getElementById('fp-add-title').textContent='编辑作品';
  document.getElementById('f-title').value=item.title||'';
  document.getElementById('f-start').value=item.startDate||'';
  document.getElementById('f-end').value=item.endDate||'';
  document.getElementById('f-genre').value=item.genre||'';
  document.getElementById('f-year').value=item.year||'';
  document.getElementById('f-episodes').value=item.episodes||'';
  document.getElementById('f-progress').value=item.progress||'';
  document.getElementById('f-synopsis').value=item.synopsis||'';
  document.getElementById('f-cover-url').value=(item.cover&&!item.cover.startsWith('data:'))?item.cover:'';
  document.getElementById('f-review').value=item.review||'';
  document.getElementById('cover-emoji-preview').textContent=item.emoji||'🎬';
  if(item.cover){
    document.getElementById('cover-img-preview').src=item.cover;
    document.getElementById('cover-img-preview').style.display='block';
    document.getElementById('cover-emoji-preview').style.display='none';
  } else {
    document.getElementById('cover-img-preview').style.display='none';
    document.getElementById('cover-emoji-preview').style.display='';
  }
  renderFormUI();
  showPage('fp-add');
  document.getElementById('fp-add').scrollTop=0;
}

function deleteDetail(){
  if(!confirm('确定删除这部作品？'))return;
  DB.items=DB.items.filter(function(i){return i.id!==detailId;});
  saveDB();closeDetail();
  switchPage(curPage);
  document.getElementById('hd-count').textContent=DB.items.length+'部';
}

// ══ 所有金句 ══
function renderAllQuotes(){
  var html='';
  DB.items.forEach(function(item){
    if(!item.quotes||!item.quotes.length)return;
    html+='<div style="margin-bottom:20px">'
      +'<div style="font-weight:700;font-size:14px;margin-bottom:8px;color:#111">'+esc(item.title)+'</div>'
      +item.quotes.map(function(q){
        return '<div class="quote-item"><div class="quote-text">'+esc(q.text)+'</div>'+(q.time?'<div class="quote-from">'+q.time+'</div>':'')+'</div>';
      }).join('')+'</div>';
  });
  document.getElementById('quotes-body').innerHTML=html||'<div class="empty">还没有收藏任何金句</div>';
}

// ══ 统计 ══
function renderStats(){
  var total=DB.items.length;
  var watched=DB.items.filter(function(i){return i.status==='watched';}).length;
  var movies=DB.items.filter(function(i){return i.type==='movie';}).length;
  var books=DB.items.filter(function(i){return i.type==='book';}).length;
  var quotes=DB.items.reduce(function(acc,i){return acc+(i.quotes?i.quotes.length:0);},0);
  var rated=DB.items.filter(function(i){return i.rating>0;});
  var avgRating=rated.length?Math.round(rated.reduce(function(a,i){return a+i.rating;},0)/rated.length*10)/10:0;
  document.getElementById('stat-grid').innerHTML=[
    {n:total,l:'总作品'},
    {n:watched,l:'已看完'},
    {n:movies,l:'电影'},
    {n:books,l:'书籍'},
    {n:quotes,l:'金句'},
    {n:avgRating||'-',l:'平均评分'},
  ].map(function(s){
    return '<div class="stat-card"><div class="stat-num">'+s.n+'</div><div class="stat-label">'+s.l+'</div></div>';
  }).join('');
}

// ══ 设置页 ══
function showPage(id){
  document.getElementById(id).classList.add('show');
  if(id==='fp-settings')renderStats();
}

// ══ 导出/导入 ══
function exportData(){
  var json=JSON.stringify(DB,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='追剧记备份_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  var file=e.target.files[0];
  if(!file)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!data.items)throw new Error('格式错误');
      if(!confirm('导入将覆盖当前所有数据，确定吗？'))return;
      DB=data;
      saveDB();
      switchPage(curPage);
      renderStats();
      alert('导入成功！共'+DB.items.length+'部作品');
    }catch(err){alert('导入失败：文件格式不正确');}
  };
  rd.readAsText(file);
}

// ══ 初始化 ══
renderList();
